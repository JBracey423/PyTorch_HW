<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Classification</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/onnx-runtime-web.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        #image-upload-container {
            margin-bottom: 20px;
        }
        #image-preview {
            max-width: 300px;
            max-height: 300px;
            margin-top: 10px;
            border: 1px solid #ccc;
            display: none; /* Hidden by default */
        }
        #prediction-result {
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
        }
        #loading {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Fruit Classifier</h1>
    <div id="image-upload-container">
        <input type="file" id="imageUpload" accept="image/*">
        <button id="predictButton" disabled>Predict</button>
    </div>
    <img id="image-preview" alt="Image Preview">
    <div id="loading">Loading model...</div>
    <div id="prediction-result"></div>

    <script src="script.js"></script>
</body>
</html>
